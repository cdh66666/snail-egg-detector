<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-label="Snail egg detector pipeline">
  <rect width="1200" height="360" fill="#f7faf8"/>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#256d47"/>
    </marker>
    <style>
      .box { fill: #ffffff; stroke: #256d47; stroke-width: 3; rx: 12; }
      .title { font-family: Arial, sans-serif; font-size: 27px; font-weight: 700; fill: #163825; }
      .text { font-family: Arial, sans-serif; font-size: 20px; fill: #244234; }
      .small { font-family: Arial, sans-serif; font-size: 17px; fill: #5b6b63; }
      .arrow { stroke: #256d47; stroke-width: 4; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <text x="600" y="46" text-anchor="middle" class="title">MaixCam Snail Egg Detection Pipeline</text>

  <rect x="42" y="95" width="210" height="145" class="box"/>
  <text x="147" y="138" text-anchor="middle" class="text">Camera Frame</text>
  <text x="147" y="173" text-anchor="middle" class="small">320 x 320 RGB</text>
  <text x="147" y="202" text-anchor="middle" class="small">low latency input</text>

  <path d="M 262 168 H 332" class="arrow"/>

  <rect x="344" y="95" width="210" height="145" class="box"/>
  <text x="449" y="132" text-anchor="middle" class="text">YOLOv8n</text>
  <text x="449" y="166" text-anchor="middle" class="small">candidate boxes</text>
  <text x="449" y="195" text-anchor="middle" class="small">conf >= 0.65</text>

  <path d="M 564 168 H 634" class="arrow"/>

  <rect x="646" y="95" width="230" height="145" class="box"/>
  <text x="761" y="126" text-anchor="middle" class="text">Safety Filters</text>
  <text x="761" y="159" text-anchor="middle" class="small">shape + size</text>
  <text x="761" y="187" text-anchor="middle" class="small">pink color gate</text>
  <text x="761" y="215" text-anchor="middle" class="small">2-frame stability</text>

  <path d="M 886 168 H 956" class="arrow"/>

  <rect x="968" y="95" width="190" height="145" class="box"/>
  <text x="1063" y="132" text-anchor="middle" class="text">Final Targets</text>
  <text x="1063" y="166" text-anchor="middle" class="small">ID sorted boxes</text>
  <text x="1063" y="195" text-anchor="middle" class="small">center for aiming</text>

  <rect x="60" y="282" width="1080" height="48" fill="#e6f1eb" stroke="#c5dccd" stroke-width="2" rx="8"/>
  <text x="600" y="313" text-anchor="middle" class="small">Laser control should only use final stable targets, with a physical enable switch, interlock, and disabled-laser dry run first.</text>
</svg>
